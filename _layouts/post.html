---
layout: default
---

{% assign hero = page.hero_image | default: "/assets/images/hero-default.webp" %}

<section
  class="post-hero"
  style="--post-hero-image: url('{{ hero | relative_url }}');"
>
  <div class="post-hero-inner">
    <h1 class="post-hero-title">{{ page.title }}</h1>

    {% if page.subtitle %}
      <p class="post-hero-subtitle">{{ page.subtitle }}</p>
    {% elsif page.description %}
      <p class="post-hero-subtitle">{{ page.description }}</p>
    {% endif %}
  </div>
</section>

<main class="post-wrap">
  <article class="post-card post-card--wide">
    <div class="prose post-content">
      {{ content }}
    </div>
  </article>
</main>
