# ---- Site basics
title: Embracing Authenticity
description: A quiet space for self-discovery, emotional honesty, and coming home to yourself.
url: "https://embracingauthenticity.co.uk"
baseurl: ""
markdown: kramdown
future: true

# ---- URLs
permalink: /blog/:title/

# ---- Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-paginate-v2

# ---- Pagination
pagination:
  enabled: true
  per_page: 12
  permalink: /blog/page/:num/
  title: ":title - Page :num"
  limit: 0
  sort_field: "date"
  sort_reverse: true

# ---- Collections
collections:
  pages:
    output: true
    permalink: /:title/

  principles:
    output: true
    permalink: /principles/:name/

  tag:
    output: true
    permalink: /tag/:name/

# ---- Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      tags: []
      emotions: []
      permalink: /blog/:title/

  - scope:
      path: ""
      type: principles
    values:
      layout: page
      sitemap: true

  - scope:
      path: ""
      type: pages
    values:
      layout: page
      sitemap: true

# ---- Main navigation
nav:
  - text: Start Here
    url: /start-here
  - text: Self-Discovery
    url: /self-discovery
  - text: Music & Meaning
    url: /music-meaning
  - text: Reflections
    url: /blog

# ---- Social / preview image
image: /assets/images/heroes/blog-reflections.webp

# ---- Markdown
kramdown:
  input: GFM
  hard_wrap: false

# ---- Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - netlify.toml
  - _archive_snapshot_2025-09-19
  - _archive_unused